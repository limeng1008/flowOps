<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FlowOps</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                font-family: 'Microsoft YaHei', -apple-system, 'PingFang SC', 'Segoe UI', sans-serif;
                background: linear-gradient(135deg, #0b1f3a 0%, #14366b 100%);
                color: #fff;
                user-select: none;
                overflow: hidden;
            }
            .wrap {
                height: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 22px;
            }
            .brand {
                font-size: 34px;
                font-weight: 700;
                letter-spacing: 1px;
            }
            .brand span {
                color: #4ea1ff;
            }
            .tip {
                font-size: 13px;
                opacity: 0.7;
            }
            .spinner {
                width: 34px;
                height: 34px;
                border: 3px solid rgba(255, 255, 255, 0.2);
                border-top-color: #4ea1ff;
                border-radius: 50%;
                animation: spin 0.9s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <div class="brand">Flow<span>Ops</span></div>
            <div class="spinner"></div>
            <div class="tip">正在启动本地服务，首次启动需初始化数据库，请稍候…</div>
        </div>
    </body>
</html>
